<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent One Chat</title>
    <link rel="stylesheet" href="/styles/page.css" />
    <link rel="stylesheet" href="/styles/chat.css" />
  </head>
  <body class="app-page app-page-chat">
    <main class="chat-shell">
      <header class="chat-header">
        <div>
          <p class="page-eyebrow">Single Chat</p>
          <h1 class="page-title">Chat</h1>
        </div>
        <div class="chat-header-actions">
          <button type="button" class="secondary-button" data-chat-system-button>System Prompt</button>
          <button type="button" class="secondary-button" data-chat-settings-button>Connection</button>
          <button type="button" class="secondary-button danger" data-chat-clear-button>Clear</button>
        </div>
      </header>

      <section class="chat-meta">
        <div class="meta-card">
          <span class="meta-label">Endpoint</span>
          <span class="meta-value" data-chat-endpoint-summary>OpenRouter</span>
        </div>
        <div class="meta-card">
          <span class="meta-label">Model</span>
          <span class="meta-value" data-chat-model-summary>Loading...</span>
        </div>
        <div class="meta-card">
          <span class="meta-label">System Prompt</span>
          <span class="meta-value" data-chat-prompt-summary>Loading...</span>
        </div>
      </section>

      <section class="chat-thread-wrap">
        <div class="chat-thread" data-chat-thread></div>
      </section>

      <footer class="chat-composer-wrap">
        <p class="chat-status" data-chat-status>Ready.</p>
        <form class="chat-composer" data-chat-form>
          <textarea
            name="message"
            rows="1"
            placeholder="Message Agent One..."
            data-chat-input
          ></textarea>
          <div class="chat-composer-actions">
            <span class="composer-hint">Enter to send, Shift+Enter for newline</span>
            <button type="submit" class="primary-button" data-chat-send-button>Send</button>
          </div>
        </form>
      </footer>
    </main>

    <dialog class="chat-dialog" data-chat-system-dialog>
      <form method="dialog" class="dialog-card" data-chat-system-form>
        <header class="dialog-header">
          <div>
            <p class="page-eyebrow">System Prompt</p>
            <h2>Edit system instructions</h2>
          </div>
        </header>
        <label class="field">
          <span>Prompt</span>
          <textarea rows="12" data-chat-system-input></textarea>
        </label>
        <div class="dialog-actions">
          <button type="button" class="secondary-button" data-chat-system-cancel>Cancel</button>
          <button type="submit" class="primary-button">Save Prompt</button>
        </div>
      </form>
    </dialog>

    <dialog class="chat-dialog" data-chat-settings-dialog>
      <form method="dialog" class="dialog-card" data-chat-settings-form>
        <header class="dialog-header">
          <div>
            <p class="page-eyebrow">Connection</p>
            <h2>API endpoint and credentials</h2>
          </div>
        </header>
        <label class="field">
          <span>API Endpoint URL</span>
          <input type="url" data-chat-endpoint-input />
        </label>
        <label class="field">
          <span>Model</span>
          <input type="text" data-chat-model-input />
        </label>
        <label class="field">
          <span>API Key</span>
          <input type="password" data-chat-api-key-input />
        </label>
        <p class="dialog-note">
          These values are stored in <code>localStorage</code> on this device for convenience.
        </p>
        <div class="dialog-actions">
          <button type="button" class="secondary-button" data-chat-settings-cancel>Cancel</button>
          <button type="submit" class="primary-button">Save Settings</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/pages/chat.js"></script>
  </body>
</html>
