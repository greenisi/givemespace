cols: 4
id: crypto-prices
name: Crypto Prices
renderer: |-
  async (parent, currentSpace) => {
      const updatePrices = async () => {
        try {
          const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
          const data = await response.json();
          
          const coins = [
            { id: 'bitcoin', name: 'Bitcoin', symbol: 'BTC', data: data.bitcoin },
            { id: 'ethereum', name: 'Ethereum', symbol: 'ETH', data: data.ethereum }
          ];

          parent.innerHTML = `
            <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 16px; display: flex; flex-direction: column; gap: 12px;">
              
              ${coins.map(coin => {
                const price = coin.data.usd;
                const change = coin.data.usd_24h_change;
                const isPositive = change >= 0;
                return `
                  <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333;">
                    <div>
                      <div style="font-weight: 600; color: #ddd;">${coin.name} <span style="color: #999; font-size: 0.8em;">${coin.symbol}</span></div>
                      <div style="font-size: 1.2em; font-weight: bold; color: #fff;">$${price.toLocaleString()}</div>
                    </div>
                    <div style="text-align: right;">
                      <div style="font-weight: 600; color: ${isPositive ? '#2ecc71' : '#e74c3c'};">
                        ${isPositive ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%
                      </div>
                      <div style="font-size: 0.7em; color: #999;">24h Change</div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        } catch (e) {
          parent.innerHTML = '<div style="padding: 16px; color: red;">Failed to load prices</div>';
        }
      };

      await updatePrices();
      const timer = setInterval(updatePrices, 60000);
      return () => clearInterval(timer);
    }
rows: 4
