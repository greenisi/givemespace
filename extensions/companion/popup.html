<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GiveMeSpace Companion</title>
<style>
  :root {
    --bg: #050816;
    --fg: #f5f7fb;
    --accent: #59f0a8;
    --muted: #94a3b8;
    --border: #1e293b;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    width: 280px;
    padding: 16px;
  }
  h1 { font-size: 14px; margin: 0 0 4px; letter-spacing: 0.02em; }
  .v  { color: var(--muted); font-size: 12px; }
  .row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 12px; padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
  }
  .dot.on  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.off { background: #ef4444; }
  a {
    color: var(--accent); text-decoration: none;
  }
  a:hover { text-decoration: underline; }
  .links { margin-top: 16px; font-size: 12px; color: var(--muted); }
  .links a { display: block; margin-top: 6px; }
</style>
</head>
<body>
  <h1>GiveMeSpace Companion</h1>
  <div class="v" id="version">v?</div>

  <div class="row">
    <div class="dot off" id="dot"></div>
    <div id="status">Checking…</div>
  </div>

  <div class="links">
    <a href="https://givemespace.ai" target="_blank" rel="noopener">Open GiveMeSpace</a>
    <a href="https://github.com/greenisi/givemespace" target="_blank" rel="noopener">View source</a>
  </div>

<script src="popup.js"></script>
</body>
</html>
